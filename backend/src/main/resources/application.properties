# ========================================
# SecHub - Application Configuration
# ========================================

# Server
server.port=${PORT:8888}
spring.application.name=sechub-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}

# PostgreSQL Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:sechub_db}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${PGUSER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:1}}

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=3000

# Reduce transfer time for JSON responses on production networks.
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/plain,text/css,application/javascript
server.compression.min-response-size=1024
server.http2.enabled=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET:SecHub2024SuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong!!}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# CORS
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:5173,http://localhost:4200}

# Lesson Data Synchronization
app.sync.token=${SYNC_TOKEN:sechub-data-sync-token-super-secret}
app.lesson-data.github.auto-sync=true
app.lesson-data.github.owner=Little-Boy-s-SecHub
app.lesson-data.github.repo=Data
app.lesson-data.github.branch=main
app.lesson-data.github.api-base-url=https://api.github.com
app.lesson-data.github.raw-base-url=https://raw.githubusercontent.com
app.lesson-data.github.request-timeout-seconds=20


# Logging
logging.level.com.sechub=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# OpenAI API Configuration
app.openai.api-key=${OPENAI_API_KEY:}
app.openai.model=${OPENAI_MODEL:gpt-5.6-sol}
app.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}

# Generated labs are source-controlled templates populated by AI-generated specs.
app.lab.generated-root=${LAB_GENERATED_ROOT:./runtime/generated-labs}
app.lab.expiration-check-ms=30000

# Railway health check
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
