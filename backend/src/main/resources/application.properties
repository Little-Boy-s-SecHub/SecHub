# ========================================
# SecHub - Application Configuration
# ========================================

# Server
server.port=8888
spring.application.name=sechub-backend

# PostgreSQL Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sechub_db}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1}

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT Configuration
app.jwt.secret=SecHub2024SuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong!!
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:4200

# Lesson Data Synchronization
app.sync.token=sechub-data-sync-token-super-secret
app.lesson-data.github.auto-sync=true
app.lesson-data.github.owner=Little-Boy-s-SecHub
app.lesson-data.github.repo=Data
app.lesson-data.github.branch=main
app.lesson-data.github.api-base-url=https://api.github.com
app.lesson-data.github.raw-base-url=https://raw.githubusercontent.com
app.lesson-data.github.request-timeout-seconds=20


# Logging
logging.level.com.sechub=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# OpenAI API Configuration
app.openai.api-key=${OPENAI_API_KEY:}
