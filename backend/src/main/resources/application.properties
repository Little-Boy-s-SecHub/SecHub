# ========================================
# SecHub - Application Configuration
# ========================================

# Server
server.port=8888
spring.application.name=sechub-backend

# H2 Database
spring.datasource.url=jdbc:h2:file:./data/sechub_db;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT Configuration
app.jwt.secret=SecHub2024SuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong!!
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:4200

# Lesson Data Synchronization
app.sync.token=sechub-data-sync-token-super-secret


# Logging
logging.level.com.sechub=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
