name: Deploy production

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      API_BASE_URL: ${{ secrets.PRODUCTION_API_BASE_URL }}
      WEB_BASE_URL: ${{ secrets.PRODUCTION_WEB_BASE_URL }}
      K6_USERNAME: ${{ secrets.K6_USERNAME }}
      K6_PASSWORD: ${{ secrets.K6_PASSWORD }}
    steps:
      - name: Check out tested revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate deployment secrets
        shell: bash
        run: |
          required=(RAILWAY_TOKEN RAILWAY_PROJECT_ID VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID API_BASE_URL WEB_BASE_URL K6_USERNAME K6_PASSWORD)
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then echo "Missing GitHub production secret: $name"; exit 1; fi
          done

      - name: Install deployment CLIs
        run: npm install --global @railway/cli vercel

      - name: Deploy backend to Railway
        run: railway up backend --path-as-root --ci --project "$RAILWAY_PROJECT_ID" --service sechub-backend --environment production --message "GitHub ${GITHUB_SHA}"

      - name: Wait for backend health
        shell: bash
        run: |
          health_url="${API_BASE_URL%/api}/actuator/health"
          for attempt in {1..30}; do
            if curl --fail --silent --show-error "$health_url" | grep -q '"status":"UP"'; then exit 0; fi
            sleep 10
          done
          echo "Backend did not become healthy: $health_url"
          exit 1

      - name: Pull Vercel production configuration
        working-directory: frontend
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build frontend with Vercel
        working-directory: frontend
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy frontend to Vercel
        working-directory: frontend
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      - name: Verify frontend
        run: curl --fail --silent --show-error --retry 8 --retry-delay 5 --retry-all-errors "$WEB_BASE_URL" > /dev/null

      - name: Production k6 smoke test
        run: |
          docker run --rm \
            -e BASE_URL="$API_BASE_URL" \
            -e K6_USERNAME="$K6_USERNAME" \
            -e K6_PASSWORD="$K6_PASSWORD" \
            -v "$PWD:/work" -w /work \
            grafana/k6:2.1.0 run --vus 1 --duration 15s performance/k6/smoke.js
