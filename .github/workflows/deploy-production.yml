name: Deploy production

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VPS_HOST: ${{ secrets.VPS_HOST || '116.118.6.91' }}
      VPS_USER: ${{ secrets.VPS_USER || 'root' }}
      VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
      API_BASE_URL: https://api.littleboys.biz/api
      WEB_BASE_URL: https://sechub-academy.vercel.app
      K6_USERNAME: ${{ secrets.K6_USERNAME }}
      K6_PASSWORD: ${{ secrets.K6_PASSWORD }}
    steps:
      - name: Check out tested revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate deployment secrets
        shell: bash
        run: |
          required=(VPS_SSH_PRIVATE_KEY VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID)
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then echo "Missing GitHub production secret: $name"; exit 1; fi
          done

      - name: Install Vercel CLI
        run: npm install --global vercel

      - name: Configure VPS SSH
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/sechub_deploy
          chmod 600 ~/.ssh/sechub_deploy
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy backend to VPS
        shell: bash
        run: |
          ssh -i ~/.ssh/sechub_deploy "$VPS_USER@$VPS_HOST" 'bash -se' <<'REMOTE'
          set -euo pipefail
          cd /opt/SecHub
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          cd backend
          mvn --batch-mode -DskipTests package
          systemctl restart sechub-backend
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8888/actuator/health | grep -q '"status":"UP"'; then
              exit 0
            fi
            sleep 2
          done
          journalctl -u sechub-backend -n 80 --no-pager
          exit 1
          REMOTE

      - name: Wait for backend health
        shell: bash
        run: |
          health_url="${API_BASE_URL%/api}/actuator/health"
          for attempt in {1..30}; do
            if curl --fail --silent --show-error "$health_url" | grep -q '"status":"UP"'; then exit 0; fi
            sleep 10
          done
          echo "Backend did not become healthy: $health_url"
          exit 1

      - name: Pull Vercel production configuration
        working-directory: frontend
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build frontend with Vercel
        working-directory: frontend
        run: vercel build --prod --token="$VERCEL_TOKEN" --build-env NEXT_PUBLIC_API_BASE_URL="$API_BASE_URL"

      - name: Deploy frontend to Vercel
        working-directory: frontend
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      - name: Verify frontend
        run: curl --fail --silent --show-error --retry 8 --retry-delay 5 --retry-all-errors "$WEB_BASE_URL" > /dev/null

      - name: Production k6 smoke test
        if: ${{ env.K6_USERNAME != '' && env.K6_PASSWORD != '' }}
        run: |
          docker run --rm \
            -e BASE_URL="$API_BASE_URL" \
            -e K6_USERNAME="$K6_USERNAME" \
            -e K6_PASSWORD="$K6_PASSWORD" \
            -v "$PWD:/work" -w /work \
            grafana/k6:2.1.0 run --vus 1 --duration 15s performance/k6/smoke.js
